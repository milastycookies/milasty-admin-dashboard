<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MILASTY Admin Dashboard</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#111111" />
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">

  <!-- FONT -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      background: #f6f7fb;
      color: #111;
    }

    /* =======================
       HEADER
    ======================= */
    .header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(10px);
      padding: 14px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #eee;
    }

    .title {
      font-size: 18px;
      font-weight: 600;
    }

    .logout {
      padding: 6px 12px;
      border: none;
      border-radius: 8px;
      background: #111;
      color: white;
      font-size: 12px;
      cursor: pointer;
    }

    .status-btn {
      border: none;
      border-radius: 999px;
      padding: 6px 12px;
      margin-right: 6px;
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .status-btn:hover {
      opacity: 0.85;
    }
    
    .status-btn:active {
      transform: scale(0.95);
    }
    
    /* COLORS */
    .btn-paid {
      background: #dcfce7;
      color: #166534;
    }
    
    .btn-pending {
      background: #fee2e2;
      color: #991b1b;
    }
    
    .btn-prepared {
      background: #dbeafe;
      color: #1e40af;
    }
    
    .btn-not-prepared {
      background: #f3f4f6;
      color: #555;
    }
    
    .btn-dispatched {
      background: #fff7ed;
      color: #9a3412;
    }
    
    .btn-delivered {
      background: #dcfce7;
      color: #065f46;
    }

    .container h3 {
      margin-bottom: 14px;
      font-size: 16px;
      font-weight: 600;
      color: #222;
    }
    
    /* =======================
       CONTENT
    ======================= */
    .container {
      padding: 16px;
      padding-bottom: 90px; /* space for nav */
      transition: opacity 0.2s ease;
    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 14px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.06);
      transition: all 0.2s ease;
    }
    
    .card:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 30px rgba(0,0,0,0.08);
    }

    .card h4 {
      font-size: 15px;
      margin-bottom: 6px;
    }
    
    .card p {
      font-size: 13px;
      color: #555;
      margin-bottom: 4px;
    }

    .loading {
      text-align: center;
      color: #777;
      margin-top: 40px;
    }

    /* =======================
       BOTTOM NAV
    ======================= */
    .nav {
      position: fixed;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      width: 95%;
      max-width: 900px;
      display: flex;
      justify-content: space-around;
      background: white;
      border-radius: 14px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      padding: 8px 0;
    }

    .nav button {
      flex: 1;
      border: none;
      background: none;
      font-size: 11px;
      color: #555;
      padding: 6px 0;
      cursor: pointer;
    }

    .nav button.active {
      color: #000;
      font-weight: 600;
    }

    /* =======================
       MOBILE TWEAKS
    ======================= */
    @media (min-width: 768px) {
      .container {
        max-width: 900px;
        margin: auto;
      }

      .nav {
        max-width: 900px;
        left: 50%;
        transform: translateX(-50%);
        border-radius: 14px 14px 0 0;
      }
    }
  </style>
</head>

<body>

  <script>
    if (!localStorage.getItem("token")) {
      window.location.replace("/login.html")
    }
  </script>


  <!-- HEADER -->
  <div class="header">
    <div class="title">🍪 MILASTY Dashboard</div>
    <button class="logout" onclick="logout()">Logout</button>
  </div>

  <!-- CONTENT -->
  <div class="container">
    <div id="app" class="loading">
      <div style="font-size:14px;color:#777;">Loading MILASTY dashboard...</div>
    </div>
  </div>

  <!-- BOTTOM NAV -->
  <div class="nav">
    <button onclick="setTab('production')" id="tab-production">🍪<br>Production</button>
    <button onclick="setTab('orders')" id="tab-orders">📦<br>Orders</button>
    <button onclick="setTab('dispatch')" id="tab-dispatch">🚚<br>Dispatch</button>
    <button onclick="setTab('analytics')" id="tab-analytics">📊<br>Analytics</button>
    <button onclick="setTab('customers')" id="tab-customers">👥<br>Customers</button>
  </div>

  <!-- LIBS -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- APP -->
  <script type="module" src="app.js"></script>

  <!-- SERVICE WORKER -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js')
    }
  </script>

  <script>
    function updateActiveTab(tab) {
      document.querySelectorAll(".nav button").forEach(btn => {
        btn.classList.remove("active")
      })
      document.getElementById(`tab-${tab}`).classList.add("active")
    }
  
    const originalSetTab = window.setTab
    window.setTab = function(tab) {
      const container = document.querySelector(".container")
      container.style.opacity = "0.6"
    
      setTimeout(() => {
        updateActiveTab(tab)
        originalSetTab(tab)
        container.style.opacity = "1"
      }, 100)
    }
  
    // default active
    updateActiveTab("production")
  </script>

</body>
</html>
